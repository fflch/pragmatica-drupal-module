pragmatica.example:
  path: '/pragmatica/example'
  defaults:
    _title: 'Example'
    _controller: '\Drupal\pragmatica\Controller\PragmaticaController::build'
  requirements:
    _permission: 'access content'

pragmatica.settings_form:
  path: '/admin/config/system/pragmatica'
  defaults:
    _title: 'Pragmática settings'
    _form: 'Drupal\pragmatica\Form\SettingsForm'
  requirements:
    _permission: 'administer pragmatica configuration'
